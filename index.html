<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="index.css">
</head>
<body> 
    <nav>
        <div>
            <img src="images/download.png" alt="Antaris logo">
            <h2>ANTARIS</h2>
        </div>
    </nav>

    <div>
        <div>
            <form action="" method="get" class="orig">
                <fieldset>
                    <legend>Account Login</legend>
        
                    <div class="form-group">
                        <label for="username">Username:</label>
                        <input type="text" id="username" name="username" placeholder="Enter your name" required>
                    </div>
        
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <div>
                        <button type="submit"><a href="dashboard.html">Login</a></button>
                        <p>Don't have an account? <a href="#" type="button" class="signup">Signup</a></p>
                    </div>
                </fieldset>
            </form>
    
            <form action="" method="GET" class="hide">
                <fieldset>
                    <legend>Create Account</legend>
    
                    <div>
                        <label for="Name">Name:</label>
                        <input type="text" name="Name" placeholder="Enter your name" required>
                    </div>
    
                    <div>
                        <label for="email">Email:</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>
    
                    <div>
                        <label for="Password">Password:</label>
                        <input type="password" placeholder="Input your password" name="Password" required>
                    </div>
    
                    <div class="confirm">
                        <label for="confirm">Confirm Password:</label>
                        <input type="password" placeholder="Confirm password" name="confiirm" required>
                    </div>
    
                    <div>
                        <button type="submit"><a href="index.html">Sign In</a></button>
                        <p>Already have an account? <a href="#" type="button" class="login">Login</a></p>
                    </div>
                </fieldset>
            </form>
        </div>
        <div>
            <p>ANTARIS</p>
            <P>THE WAY TO GO</P>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
